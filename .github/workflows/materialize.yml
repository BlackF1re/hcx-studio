name: Materialize repository

on:
  push:
    branches: [agent/publish-product]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-hcx-studio
  cancel-in-progress: false

jobs:
  materialize:
    if: hashFiles('.bootstrap/part-*.b64') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand verified source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-*.b64 | base64 -d > /tmp/hcx-studio-source.tar.xz
          echo "fb521d959d2c21b3338e8a7bd1bd16d18048c20e7e7c99b7b46f8ed5179f1453  /tmp/hcx-studio-source.tar.xz" | sha256sum -c -
          mkdir -p /tmp/hcx-source
          tar -xJf /tmp/hcx-studio-source.tar.xz -C /tmp/hcx-source
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/hcx-source/. .

      - name: Validate source
        env:
          QT_QPA_PLATFORM: offscreen
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0
          python3 -m pip install --upgrade pip
          python3 -m pip install -e '.[dev]' build twine
          ./scripts/check.sh
          python3 -m build
          python3 -m twine check dist/*

      - name: Commit product tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf dist build .coverage htmlcov .pytest_cache .ruff_cache
          git add -A
          git commit -m "chore: materialize HCX Studio 0.2.0"
          git push origin HEAD:agent/publish-product

# retriggered after repository verification
